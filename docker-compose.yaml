  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: cryptax-api
    restart: unless-stopped
    depends_on:
      # mariadb:
      #   condition: service_healthy
      redis:
        condition: service_healthy
      # minio:
      #   condition: service_healthy
    environment:
      # TZ: Europe/Madrid

      # APP_ENV: local

      DB_HOST: 192.168.77.109
      DB_PORT: 3306
      DB_NAME: cryptax
      DB_USER: yalcryptax
      DB_PASSWORD: /run/secrets/mariadb_usr_password    # This will be read by pydantic config, so it does not need the _FILE

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      RQ_QUEUE_NAME: tax_jobs

      # S3_ENDPOINT: http://minio:9000
      # S3_ACCESS_KEY_FILE: /run/secrets/api_key
      # S3_SECRET_KEY_FILE: /run/secrets/api_secret
      # S3_BUCKET: cryptotax
      # S3_REGION: eu-south-2
      # S3_SECURE: "false"

      # APP_SECRET_KEY_FILE: /run/secrets/app_secret_key
      # JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      # DATA_ENCRYPTION_KEY_FILE: /run/secrets/data_encryption_key

      PYTHONPATH: /app
      #  DATA_DIR: /data
    volumes:
      - ./cryptax-data/api:/data
      - ./cryptax-data/api/logs:/app/logs
    secrets:
      - mariadb_usr_password
      # - minio_root_user
      # - minio_root_password
      # - app_secret_key
      # - jwt_secret_key
      # - data_encryption_key
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    networks:
      - backend

secrets:
  mariadb_usr_password:
    file: ./secrets/mariadb_usr_password.txt
