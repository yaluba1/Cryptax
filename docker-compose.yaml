  redis:
    image: redis:7-alpine
    container_name: cryptax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./cryptax-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - backend

